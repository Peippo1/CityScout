name: CI

on:
  push:
    branches: ["main", "dev"]
    paths:
      - "backend/**"
      - "web/**"
      - ".github/workflows/ci.yml"
      - "README.md"
  pull_request:
    paths:
      - "backend/**"
      - "web/**"
      - ".github/workflows/ci.yml"
      - "README.md"
  workflow_dispatch:

jobs:
  backend-tests:
    name: Backend tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install backend dependencies
        run: python -m pip install --upgrade pip && pip install -r requirements.txt

      - name: Run pytest
        run: python -m pytest

  backend-security:
    name: Backend security checks
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install security tooling
        run: python -m pip install --upgrade pip bandit

      - name: Run Bandit
        run: bandit -r app -x tests

  web-checks:
    name: Web checks
    if: hashFiles('web/package.json') != ''
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install web dependencies
        run: npm install

      - name: Run lint
        run: npm run lint

      - name: Run unit tests
        run: npm test

      - name: Run build
        run: npm run build
