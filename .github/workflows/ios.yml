name: iOS (CityScout)

on:
  push:
    branches: ["main", "dev"]
    paths:
      - "CityScout/**"
      - "CityScout.xcodeproj/**"
      - "CityScoutTests/**"
      - "CityScoutUITests/**"
      - ".github/workflows/ios.yml"
      - "README.md"
  pull_request:
    paths:
      - "CityScout/**"
      - "CityScout.xcodeproj/**"
      - "CityScoutTests/**"
      - "CityScoutUITests/**"
      - ".github/workflows/ios.yml"
      - "README.md"
  workflow_dispatch:

jobs:
  build-smoke:
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Xcode version
        run: xcodebuild -version

      - name: List schemes
        run: xcodebuild -list -project CityScout.xcodeproj

      - name: Build smoke test
        run: |
          xcodebuild \
            -project CityScout.xcodeproj \
            -scheme CityScout \
            -configuration Debug \
            -sdk iphonesimulator \
            -destination "generic/platform=iOS Simulator" \
            clean build
